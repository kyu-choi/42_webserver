server {
    listen 127.0.0.1:8080;
    root ./www;
    index index.html;
    client_max_body_size 10M;

    error_page 404 /errors/404.html;
    error_page 413 /errors/413.html;

    location / {
        methods GET;
    }

    location /old {
        return 301 /;
    }

    location /submit {
        methods POST;
        client_max_body_size 4;
    }
}
