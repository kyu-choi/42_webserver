server {
    listen 127.0.0.1:8080;
    root ./www;
    index index.html;
    client_max_body_size 10M;

    error_page 400 /errors/400.html;
    error_page 413 /errors/413.html;

    location / {
        methods GET;
    }

    location /echo {
        methods POST;
        client_max_body_size 11;
    }

    location /upload {
        methods POST;
        upload on;
        upload_store ./www/uploads;
        client_max_body_size 32;
    }
}
